schemaVersion: 2.2.0
metadata:
  name: AI-MaaS-Workshop
components:
  - name: python-env
    container:
      image: registry.access.redhat.com/ubi9/python-311:latest
      memoryLimit: 2G
      env:
        - name: OPENAI_BASE_URL
          value: "https://workshop-maas-model.workshop-maas.svc.cluster.local/v1"
        - name: OPENAI_API_KEY
          value: "dummy-workshop-key"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
      command: ['tail', '-f', '/dev/null']

commands:
  - id: init-workspace
    exec:
      component: python-env
      commandLine: "bash setup.sh"
      workingDir: ${PROJECT_SOURCE}

events:
  postStart:
    - init-workspace

# The official OpenShift Dev Spaces way to auto-install extensions
attributes:
  .vscode/extensions.json: |
    {
      "recommendations": [
        "continue.continue"
      ]
    }