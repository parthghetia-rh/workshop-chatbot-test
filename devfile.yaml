schemaVersion: 2.2.0
metadata:
  name: AI-MaaS-Workshop
components:
  - name: python-env
    container:
      image: registry.access.redhat.com/ubi9/python-311:latest
      memoryLimit: 2G
      env:
        - name: OPENAI_BASE_URL
          value: "https://granite-8b-code-instruct.workshop-maas.svc.cluster.local/v1"
        - name: OPENAI_API_KEY
          value: "dummy-workshop-key"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
      mountSources: true
      # 1. We map the VS Code extension folder and Continue config to persistent volumes
      volumeMounts:
        - name: vscode-extensions
          path: /home/user/.vscode/extensions
        - name: continue-config
          path: /home/user/.continue
      command: ['tail', '-f', '/dev/null']

  # 2. We declare the physical persistent volumes so they survive workspace restarts
  - name: vscode-extensions
    volume:
      size: 1Gi
  - name: continue-config
    volume:
      size: 1Gi

# 3. We run our setup.sh script to handle python dependencies and the config injection
commands:
  - id: init-workspace
    exec:
      component: python-env
      commandLine: "bash setup.sh"
      workingDir: ${PROJECT_SOURCE}

events:
  postStart:
    - init-workspace

# 4. We use the official VS Code mechanism to prompt the user to install the extension
attributes:
  .vscode/extensions.json: |
    {
      "recommendations": [
        "Continue.continue"
      ]
    }